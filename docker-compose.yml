services:
  db:
    image: postgres:16-alpine
    network_mode: bridge
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    environment:
      POSTGRES_DB: flowassist
      POSTGRES_USER: flowassist
      POSTGRES_PASSWORD: flowassist_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowassist -d flowassist"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
    network_mode: bridge
    links:
      - db:db
      - doc-worker:doc-worker
    environment:
      NODE_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3001}
      DATABASE_URL: postgresql://flowassist:flowassist_password@db:5432/flowassist?schema=public
      PLATFORM_ADMIN_USERNAME: ${PLATFORM_ADMIN_USERNAME:-admin}
      PLATFORM_ADMIN_DISPLAY_NAME: ${PLATFORM_ADMIN_DISPLAY_NAME:-平台管理员}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-123456}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-flowassist_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/output
      DOC_WORKER_URL: http://doc-worker:8001
      PPT_WORKER_URL: http://ppt-worker:8002
      CHAT_WORKER_URL: http://chat-worker:8003
    ports:
      - "60001:3001"
    volumes:
      - shared-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  claude-proxy:
    image: alpine/socat
    command: ["-d", "-d", "TCP-LISTEN:8080,fork,reuseaddr", "TCP:172.17.0.1:8080"]
    network_mode: bridge
    restart: unless-stopped

  doc-worker:
    build:
      context: ./workers/doc-processing
    network_mode: bridge
    links:
      - claude-proxy:claude-proxy
    environment:
      PORT: 8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${DOCKER_ANTHROPIC_BASE_URL:-http://claude-proxy:8080}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      FLOWASSIST_RUNNING_IN_DOCKER: "1"
      FLOWASSIST_DOCKER_HOST_ADDRESS: ${FLOWASSIST_DOCKER_HOST_ADDRESS:-172.17.0.1}
      CLAUDE_CONFIG_DIR: /app/claude-config
      CLAUDE_WORKER_PROMPT_DIR: /app/prompts
      PDF_TO_PPT_JOB_TIMEOUT_MS: ${PDF_TO_PPT_JOB_TIMEOUT_MS:-1200000}
      PDF_TO_PPT_CLAUDE_BATCH_TIMEOUT_MS: ${PDF_TO_PPT_CLAUDE_BATCH_TIMEOUT_MS:-180000}
      PDF_TO_PPT_PAGE_BATCH_SIZE: ${PDF_TO_PPT_PAGE_BATCH_SIZE:-1}
      PDF_TO_PPT_CLAUDE_MODEL: ${PDF_TO_PPT_CLAUDE_MODEL:-sonnet}
      PDF_TO_PPT_CLAUDE_MAX_PAGES: ${PDF_TO_PPT_CLAUDE_MAX_PAGES:-3}
    depends_on:
      - claude-proxy
    volumes:
      - shared-storage:/app/storage
      - claude-config:/app/claude-config
      - ./workers/doc-processing/claude-config/skills:/app/claude-config/skills:ro
      - ./workers/doc-processing/prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  shared-storage:
  claude-config:
