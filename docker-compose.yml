services:
  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: flowassist
      POSTGRES_USER: flowassist
      POSTGRES_PASSWORD: flowassist_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowassist -d flowassist"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
    environment:
      NODE_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3001}
      DATABASE_URL: postgresql://flowassist:flowassist_password@db:5432/flowassist?schema=public
      PLATFORM_ADMIN_USERNAME: ${PLATFORM_ADMIN_USERNAME:-admin}
      PLATFORM_ADMIN_DISPLAY_NAME: ${PLATFORM_ADMIN_DISPLAY_NAME:-平台管理员}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-123456}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-flowassist_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/output
      DOC_WORKER_URL: http://doc-worker:8001
      PPT_WORKER_URL: http://ppt-worker:8002
      CHAT_WORKER_URL: http://chat-worker:8003
    ports:
      - "60001:3001"
    volumes:
      - shared-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  doc-worker:
    build:
      context: ./workers/doc-processing
    environment:
      PORT: 8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CONFIG_DIR: /app/claude-config
      CLAUDE_WORKER_PROMPT_DIR: /app/prompts
      PDF_TO_PPT_JOB_TIMEOUT_MS: ${PDF_TO_PPT_JOB_TIMEOUT_MS:-1200000}
      PDF_TO_PPT_CLAUDE_BATCH_TIMEOUT_MS: ${PDF_TO_PPT_CLAUDE_BATCH_TIMEOUT_MS:-90000}
      PDF_TO_PPT_PAGE_BATCH_SIZE: ${PDF_TO_PPT_PAGE_BATCH_SIZE:-4}
    volumes:
      - shared-storage:/app/storage
      - ./workers/doc-processing/claude-config:/app/claude-config:ro
      - ./workers/doc-processing/prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "test -n \"$$ANTHROPIC_API_KEY$$CLAUDE_CODE_OAUTH_TOKEN\" && node -e \"fetch('http://localhost:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  shared-storage:
